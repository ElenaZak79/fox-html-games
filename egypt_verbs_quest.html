<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharaoh's Quest — Irregular Verbs</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Amatic+SC:wght@700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sand: #e8c982;
    --sand-dark: #c49a4a;
    --sand-deep: #8b6321;
    --lapis: #1e5fa8;
    --lapis-dark: #0e3a73;
    --gold: #f4c842;
    --gold-dark: #c89a1e;
    --turquoise: #2bb0a8;
    --papyrus: #f5e6c8;
    --ink: #2a1a0a;
    --scarab: #0f7a6e;
    --red: #c8442c;
  }

  html, body {
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at top, #fce8b8 0%, #e8c982 40%, #c49a4a 100%);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.55 0 0 0 0 0.4 0 0 0 0 0.15 0 0 0 0.12 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    opacity: 0.4;
    pointer-events: none;
    z-index: 1;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    position: relative;
    z-index: 2;
  }

  header {
    text-align: center;
    padding: 18px 12px 24px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 5vw, 3.4rem);
    letter-spacing: 0.04em;
    color: var(--lapis-dark);
    text-shadow: 2px 2px 0 var(--gold), 4px 4px 0 rgba(0,0,0,0.15);
    line-height: 1.05;
  }
  h1 .accent { color: var(--gold-dark); }

  .subtitle {
    font-family: 'Amatic SC', cursive;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    color: var(--sand-deep);
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  .panel {
    background: linear-gradient(180deg, var(--papyrus) 0%, #eeddb0 100%);
    border: 3px solid var(--sand-deep);
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: 0 6px 0 rgba(139,99,33,0.35), 0 10px 24px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.5);
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }

  .stat {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.55);
    padding: 8px 14px;
    border-radius: 999px;
    border: 2px solid var(--sand-dark);
    font-weight: 700;
    font-size: 0.95rem;
  }
  .stat .emoji { font-size: 1.3rem; }
  .stat b { color: var(--lapis-dark); font-size: 1.15rem; }

  .btn {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 11px 22px;
    border: 3px solid var(--lapis-dark);
    border-radius: 12px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: var(--lapis-dark);
    cursor: pointer;
    box-shadow: 0 4px 0 var(--lapis-dark), 0 6px 14px rgba(0,0,0,0.2);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 0 var(--lapis-dark), 0 10px 18px rgba(0,0,0,0.25); }
  .btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 var(--lapis-dark); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn.secondary {
    background: linear-gradient(180deg, #fff 0%, #e6d6a8 100%);
    color: var(--sand-deep);
    border-color: var(--sand-deep);
    box-shadow: 0 4px 0 var(--sand-deep), 0 6px 14px rgba(0,0,0,0.15);
  }

  .btn.reveal {
    background: linear-gradient(180deg, var(--turquoise) 0%, #1a8078 100%);
    color: white;
    border-color: #0b4a44;
    box-shadow: 0 4px 0 #0b4a44, 0 6px 14px rgba(0,0,0,0.15);
  }

  .board-wrapper {
    position: relative;
    width: 100%;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 0 0 4px var(--sand-deep), 0 0 0 8px var(--gold-dark), 0 20px 40px rgba(0,0,0,0.3);
    aspect-ratio: 1600 / 893;
  }

  .board-img { width: 100%; height: 100%; display: block; object-fit: cover; }

  .overlay { position: absolute; inset: 0; pointer-events: none; }

  .tile {
    position: absolute;
    width: 5.2%;
    aspect-ratio: 1;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: auto;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .tile::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 3px dashed transparent;
    transition: border-color 0.3s;
  }
  .tile.current::after {
    border-color: var(--red);
    animation: spin 6s linear infinite;
  }
  .tile.done { filter: drop-shadow(0 0 6px rgba(244,200,66,0.9)); }
  .tile.done::before {
    content: '✓';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 2vw;
    color: var(--gold);
    text-shadow: 0 0 8px rgba(0,0,0,0.8), 2px 2px 0 var(--red);
  }
  .tile:hover { transform: translate(-50%, -50%) scale(1.1); }

  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  .pawn {
    position: absolute;
    width: 5.5%;
    aspect-ratio: 1;
    transform: translate(-50%, -85%);
    pointer-events: none;
    transition: left 0.7s cubic-bezier(.68,-0.55,.27,1.55), top 0.7s cubic-bezier(.68,-0.55,.27,1.55);
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(2rem, 5vw, 3.5rem);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
    animation: bob 1.4s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translate(-50%, -85%) scale(1); }
    50%      { transform: translate(-50%, -92%) scale(1.04); }
  }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15, 30, 60, 0.75);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 16px;
    animation: fadeIn 0.3s;
  }
  .modal-backdrop.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: linear-gradient(180deg, var(--papyrus) 0%, #e8d4a0 100%);
    border: 4px solid var(--sand-deep);
    border-radius: 18px;
    max-width: 540px;
    width: 100%;
    padding: 32px 26px 22px;
    position: relative;
    box-shadow: 0 0 0 4px var(--gold-dark), 0 20px 60px rgba(0,0,0,0.5);
    animation: pop 0.4s cubic-bezier(.68,-0.55,.27,1.55);
  }
  @keyframes pop {
    from { transform: scale(0.7) rotate(-3deg); opacity: 0; }
    to   { transform: scale(1) rotate(0); opacity: 1; }
  }

  .modal::before {
    content: attr(data-tile);
    position: absolute;
    top: -22px; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 60px;
    background: radial-gradient(circle, var(--gold) 0%, var(--gold-dark) 70%);
    border: 3px solid var(--lapis-dark);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.5rem;
    color: var(--lapis-dark);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  .scene-title {
    font-family: 'Amatic SC', cursive;
    font-size: 1.6rem;
    color: var(--sand-deep);
    text-align: center;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .story {
    text-align: center;
    font-size: 1rem;
    color: var(--ink);
    font-style: italic;
    opacity: 0.85;
    margin-bottom: 14px;
    padding: 0 4px;
  }

  .verb-card {
    background: linear-gradient(180deg, var(--lapis) 0%, var(--lapis-dark) 100%);
    color: var(--papyrus);
    border-radius: 12px;
    padding: 18px 14px;
    text-align: center;
    margin-bottom: 16px;
    border: 2px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  .verb-card::after {
    content: '𓂀';
    position: absolute;
    right: -12px; top: -22px;
    font-size: 5.5rem;
    opacity: 0.15;
  }
  .verb-label {
    font-family: 'Amatic SC', cursive;
    letter-spacing: 0.15em;
    font-size: 0.9rem;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .verb-base {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(2rem, 7vw, 3rem);
    margin: 4px 0 2px;
    color: var(--gold);
    letter-spacing: 0.02em;
    text-shadow: 0 2px 0 rgba(0,0,0,0.3);
  }
  .verb-trans {
    font-family: 'Amatic SC', cursive;
    font-size: 1.5rem;
    opacity: 0.95;
    letter-spacing: 0.05em;
  }

  .reveal-area {
    margin: 10px 0 4px;
    text-align: center;
  }
  .past-hidden {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--gold);
    background: rgba(30,95,168,0.95);
    display: inline-block;
    padding: 8px 18px;
    border-radius: 8px;
    border: 2px solid var(--gold);
    min-height: 1.5em;
    min-width: 140px;
    letter-spacing: 0.05em;
    animation: fadeIn 0.4s;
  }
  .past-hidden.hidden { visibility: hidden; }

  .task-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--sand-deep);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    text-align: center;
  }
  .task {
    font-size: 1.05rem;
    line-height: 1.5;
    text-align: center;
    padding: 4px 4px;
    font-weight: 600;
    color: var(--ink);
  }
  .task em {
    background: var(--gold);
    padding: 1px 8px;
    border-radius: 6px;
    font-style: normal;
    font-weight: 800;
    color: var(--lapis-dark);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .win { text-align: center; }
  .win h2 {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    color: var(--gold-dark);
    text-shadow: 2px 2px 0 var(--lapis-dark);
    margin-bottom: 8px;
  }
  .win .trophy { font-size: 5rem; animation: bob 1s ease-in-out infinite; }

  .hint {
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.4);
    border-left: 4px solid var(--lapis);
    border-radius: 8px;
    font-size: 0.92rem;
    color: var(--sand-deep);
    font-weight: 600;
  }
  .hint b { color: var(--lapis-dark); }

  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
  .confetti span {
    position: absolute;
    width: 10px; height: 14px;
    top: -20px;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  @media (max-width: 600px) {
    .container { padding: 10px 8px 40px; }
    .panel { padding: 10px 12px; gap: 8px; }
    .stat { padding: 6px 10px; font-size: 0.85rem; }
    .btn { font-size: 0.8rem; padding: 9px 14px; }
    .modal { padding: 28px 18px 18px; }
    .tile.done::before { font-size: 3vw; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <h1>Pharaoh's <span class="accent">Quest</span></h1>
    <div class="subtitle">𓂀 Irregular Verbs Adventure 𓂀</div>
  </header>

  <div class="panel">
    <div class="stat"><span class="emoji">🦊</span> Tile: <b id="posLabel">START</b></div>
    <div class="stat"><span class="emoji">⭐</span> Stars: <b id="scoreLabel">0</b></div>
    <div class="stat"><span class="emoji">🎲</span> Dice: <b id="diceLabel">—</b></div>
    <button class="btn" id="rollBtn">🎲 Roll the dice</button>
    <button class="btn secondary" id="resetBtn">↻ Restart</button>
  </div>

  <div class="board-wrapper">
    <img class="board-img" id="boardImg" alt="Egypt adventure board">
    <div class="overlay" id="overlay"></div>
    <div class="pawn" id="pawn" style="left: 6.5%; top: 87%;">🦊</div>
  </div>

</div>

<!-- Task modal -->
<div class="modal-backdrop" id="taskModal">
  <div class="modal" id="modalBody" data-tile="1">
    <div class="scene-title" id="sceneTitle">The Desert</div>
    <div class="story" id="storyText">A long journey begins...</div>
    <div class="verb-card">
      <div class="verb-label">Your verb</div>
      <div class="verb-base" id="vBase">go</div>
      <div class="verb-trans" id="vTrans">идти</div>
    </div>
    <div class="task-title">Your task</div>
    <div class="task" id="taskText">—</div>
    <div class="reveal-area">
      <span class="past-hidden hidden" id="pastAnswer">went</span>
    </div>
    <div class="modal-actions">
      <button class="btn reveal" id="revealBtn">👁 Show answer</button>
      <button class="btn" id="doneBtn">✓ Got it!</button>
      <button class="btn secondary" id="skipBtn">Skip</button>
    </div>
  </div>
</div>

<!-- Win modal -->
<div class="modal-backdrop" id="winModal">
  <div class="modal win">
    <div class="trophy">🏆</div>
    <h2>You reached the Great Pyramid!</h2>
    <p style="font-size:1.1rem; margin: 8px 0 4px;">Your score: <b id="finalScore" style="color:var(--lapis-dark); font-size:1.5rem;">0</b> ⭐</p>
    <p style="font-family:'Amatic SC', cursive; font-size:1.4rem; color:var(--sand-deep);" id="winMsg">Well done, brave explorer!</p>
    <div class="modal-actions">
      <button class="btn" id="playAgainBtn">🎲 Play again</button>
    </div>
  </div>
</div>

<div class="confetti" id="confetti"></div>

    {scene:"Treasure Scarab 🪲", story:"A big green scarab guards a treasure.", task:"Ask a <b>WH-question</b>.<br>Start with: <em>What did you...?</em> or <em>Where did you...?</em>"},
    {scene:"The Desert Wind 🌪", story:"A strong wind covers your tracks.", task:"Say a sentence about <b>a friend</b>.<br>Start with: <em>My best friend...</em>"},
    {scene:"The Sacred Fire 🔥", story:"A torch burns near the Sphinx.", task:"Make a sentence about a <b>priest</b>.<br>Start with: <em>The priest...</em>"},
    {scene:"The Sleeping Fox 🦊💤", story:"A tired fox naps next to the Sphinx.", task:"Use <em>all night</em> in your sentence.<br>Example: <em>The fox... all night.</em>"},
    {scene:"The Great Sphinx 🦁", story:"The giant Sphinx smiles at you.", task:"Make a sentence about the <b>Sphinx</b>.<br>Start with: <em>The Sphinx...</em>"},
    {scene:"The Running Fox 🏃", story:"A fox is racing you!", task:"Say a sentence with <em>yesterday morning</em>.<br>Example: <em>Yesterday morning the fox...</em>"},
    {scene:"Bastet, the Black Cat 🐈‍⬛", story:"The sacred cat goddess appears.", task:"Make a sentence about the <b>cat</b>.<br>Start with: <em>The black cat...</em>"},
    {scene:"Footprints in the Sand 👣", story:"You follow small fox prints.", task:"Use <em>two days ago</em>.<br>Example: <em>I... two days ago.</em>"},
    {scene:"The Hot Wind 💨", story:"A warm breeze smells of spices.", task:"Make a sentence with <em>my family</em>.<br>Start with: <em>My family and I...</em>"},
    {scene:"Guardian Scarab 🪲", story:"A scarab blocks your way!", task:"Ask a <b>Yes/No question</b>.<br>Example: <em>Did the pharaoh...?</em>"},
    {scene:"The Hungry Fox 🦊", story:"The fox is looking for food.", task:"Make a sentence about the <b>fox</b>.<br>Start with: <em>The hungry fox...</em>"},
    {scene:"Sacred Pots and Vases 🏺", story:"Ancient pots stand in a row.", task:"Make a sentence about <b>servants</b>.<br>Start with: <em>The servants...</em>"},
    {scene:"The Ankh Symbol ☥", story:"The key of life glows golden.", task:"Make a sentence about the <b>goddess</b>.<br>Start with: <em>The goddess...</em>"},
    {scene:"Rolling Sand Dunes 🏜", story:"Endless hills of sand.", task:"Say a <b>LONG</b> sentence (at least 6 words!).<br>Use the past form of your verb."},
    {scene:"Stone Gate 🗿", story:"A tall stone gate stands before you.", task:"Make a question with <em>who</em>.<br>Example: <em>Who...? (the workers)</em>"},
    {scene:"Guardian Scarab 🪲", story:"Another scarab watches you carefully.", task:"Make <b>TWO</b> sentences:<br>one <b>+</b> positive, one <b>–</b> negative."},
    {scene:"TREASURE CHEST! 💎", story:"You found the pharaoh's chest! +2 stars!", task:"<b>BONUS!</b> Say the <b>past form</b>, translate it, AND make a sentence with it!"},
    {scene:"Path to the Pyramids 🔺", story:"The pyramids are getting closer!", task:"Make a sentence about <b>workers</b>.<br>Start with: <em>The workers...</em>"},
    {scene:"Fox on the Chest 🦊", story:"A clever fox sits on treasure.", task:"Use <em>in the morning</em>.<br>Example: <em>The fox... in the morning.</em>"},
    {scene:"Endless Sands 🏜", story:"The desert stretches far away.", task:"Use <em>many years ago</em>.<br>Example: <em>Kings... many years ago.</em>"},
    {scene:"The Royal Crown 👑", story:"A jeweled crown of Egypt!", task:"Make a sentence about a <b>young prince</b>.<br>Start with: <em>The young prince...</em>"},
    {scene:"Three Little Foxes 🦊🦊🦊", story:"Three fox cubs play in the sand!", task:"Make a sentence with <em>three little foxes</em>.<br>Start with: <em>Three little foxes...</em>"},
    {scene:"Small Fox Friend 🦊", story:"A friendly fox joins your team.", task:"Make a short <b>dialogue</b>:<br>one question + one short answer."},
    {scene:"Last Scarab 🪲", story:"The final guardian of the pyramid.", task:"Say the <b>past form</b> and <b>spell it</b> letter by letter!"},
    {scene:"FINISH — The Great Pyramid! 🏆", story:"You made it to the Pyramid of Giza! +2 stars!", task:"<b>FINAL!</b> Make <b>TWO</b> amazing sentences about your adventure in Egypt!"},
  ];

  let state = { pos: 1, score: 0, visited: new Set([1]), tileVerb: {} };

  function assignVerbs() {
    const shuffled = [...VERBS].sort(() => Math.random() - 0.5);
    state.tileVerb = {};
    for (let i = 1; i <= 34; i++) {
      state.tileVerb[i] = shuffled[(i - 1) % shuffled.length];
    }
  }

  const overlay = document.getElementById('overlay');
  function buildOverlay() {
    overlay.innerHTML = '';
    for (const [n, [x, y]] of Object.entries(TILES)) {
      const el = document.createElement('div');
      el.className = 'tile';
      el.style.left = x + '%';
      el.style.top = y + '%';
      el.dataset.n = n;
      el.addEventListener('click', () => {
        if (Number(n) === state.pos && !state.visited.has(state.pos)) {
          openTask(state.pos);
        }
      });
      overlay.appendChild(el);
    }
    refreshTiles();
  }

  function refreshTiles() {
    document.querySelectorAll('.tile').forEach(el => {
      const n = Number(el.dataset.n);
      el.classList.toggle('current', n === state.pos);
      el.classList.toggle('done', state.visited.has(n) && n !== state.pos);
    });
  }

  const pawn = document.getElementById('pawn');
  function movePawn(to) {
    const [x, y] = TILES[to];
    pawn.style.left = x + '%';
    pawn.style.top = y + '%';
  }

  const rollBtn = document.getElementById('rollBtn');
  const diceLabel = document.getElementById('diceLabel');
  const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];

  rollBtn.addEventListener('click', async () => {
    if (state.pos >= 34) return;
    rollBtn.disabled = true;

    let spins = 10;
    for (let i = 0; i < spins; i++) {
      diceLabel.textContent = DICE_FACES[Math.floor(Math.random() * 6)];
      await new Promise(r => setTimeout(r, 60 + i * 8));
    }
    const roll = Math.floor(Math.random() * 6) + 1;
    diceLabel.textContent = DICE_FACES[roll - 1] + ' ' + roll;

    let next = state.pos + roll;
    if (next > 34) next = 34;

    for (let p = state.pos + 1; p <= next; p++) {
      movePawn(p);
      await new Promise(r => setTimeout(r, 180));
    }
    state.pos = next;
    document.getElementById('posLabel').textContent = state.pos === 34 ? 'FINISH' : state.pos;
    refreshTiles();

    setTimeout(() => openTask(state.pos), 400);
  });

  const modal = document.getElementById('taskModal');
  const modalBody = document.getElementById('modalBody');
  const doneBtn = document.getElementById('doneBtn');
  const skipBtn = document.getElementById('skipBtn');
  const revealBtn = document.getElementById('revealBtn');
  const pastAnswer = document.getElementById('pastAnswer');

  function openTask(tileNum) {
    const [base, past, trans] = state.tileVerb[tileNum];
    const task = TASKS[tileNum - 1];
    document.getElementById('vBase').textContent = base;
    document.getElementById('vTrans').textContent = trans;
    document.getElementById('sceneTitle').textContent = task.scene;
    document.getElementById('storyText').textContent = task.story;
    document.getElementById('taskText').innerHTML = task.task;
    pastAnswer.textContent = past;
    pastAnswer.classList.add('hidden');
    revealBtn.disabled = false;
    revealBtn.textContent = '👁 Show answer';
    modalBody.setAttribute('data-tile', tileNum);
    modal.classList.add('open');
  }

  function closeTask() { modal.classList.remove('open'); }

  revealBtn.addEventListener('click', () => {
    pastAnswer.classList.remove('hidden');
    revealBtn.disabled = true;
    revealBtn.textContent = '✓ Revealed';
  });

  doneBtn.addEventListener('click', () => {
    const tileNum = state.pos;
    const isBonus = tileNum === 26 || tileNum === 34;
    const gain = isBonus ? 2 : 1;
    if (!state.visited.has(tileNum)) {
      state.score += gain;
      state.visited.add(tileNum);
      document.getElementById('scoreLabel').textContent = state.score;
      refreshTiles();
      sparkle();
    }
    closeTask();
    rollBtn.disabled = (state.pos >= 34);
    if (state.pos >= 34) showWin();
  });

  skipBtn.addEventListener('click', () => {
    state.visited.add(state.pos);
    refreshTiles();
    closeTask();
    rollBtn.disabled = (state.pos >= 34);
    if (state.pos >= 34) showWin();
  });

  function showWin() {
    document.getElementById('finalScore').textContent = state.score;
    let msg;
    if (state.score >= 30) msg = '🏆 Pharaoh of verbs!';
    else if (state.score >= 20) msg = '⭐ Great job, explorer!';
    else if (state.score >= 10) msg = '👍 Good work! Try again!';
    else msg = '🦊 Keep practising — you can do it!';
    document.getElementById('winMsg').textContent = msg;
    document.getElementById('winModal').classList.add('open');
    bigConfetti();
  }

  document.getElementById('playAgainBtn').addEventListener('click', () => {
    document.getElementById('winModal').classList.remove('open');
    resetGame();
  });

  document.getElementById('resetBtn').addEventListener('click', resetGame);

  function resetGame() {
    state = { pos: 1, score: 0, visited: new Set([1]), tileVerb: {} };
    assignVerbs();
    document.getElementById('posLabel').textContent = 'START';
    document.getElementById('scoreLabel').textContent = '0';
    document.getElementById('diceLabel').textContent = '—';
    movePawn(1);
    refreshTiles();
    rollBtn.disabled = false;
  }

  const confettiBox = document.getElementById('confetti');
  function sparkle() {
    const colors = ['#f4c842','#2bb0a8','#c8442c','#1e5fa8','#f5e6c8'];
    for (let i = 0; i < 18; i++) {
      const s = document.createElement('span');
      s.style.left = Math.random() * 100 + '%';
      s.style.background = colors[Math.floor(Math.random() * colors.length)];
      s.style.animationDuration = (1.4 + Math.random() * 1.2) + 's';
      s.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      confettiBox.appendChild(s);
      setTimeout(() => s.remove(), 2800);
    }
  }
  function bigConfetti() {
    const colors = ['#f4c842','#2bb0a8','#c8442c','#1e5fa8','#f5e6c8','#c89a1e'];
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('span');
      s.style.left = Math.random() * 100 + '%';
      s.style.background = colors[Math.floor(Math.random() * colors.length)];
      s.style.animationDuration = (2 + Math.random() * 2) + 's';
      s.style.animationDelay = (Math.random() * 0.8) + 's';
      s.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      s.style.width = (6 + Math.random() * 8) + 'px';
      s.style.height = (10 + Math.random() * 10) + 'px';
      confettiBox.appendChild(s);
      setTimeout(() => s.remove(), 5000);
    }
  }

  assignVerbs();
  buildOverlay();
</script>
</body>
</html>
